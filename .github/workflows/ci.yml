name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - name: Ruff
        run: pip install ruff && ruff check src/

  docker:
    name: Docker build (amd64)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          COMMITS_SINCE=$(git rev-list ${LATEST_TAG}..HEAD --count 2>/dev/null || echo "0")
          MAJOR=$(echo $LATEST_TAG | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | sed 's/^v//' | cut -d. -f3)
          echo "version=${MAJOR}.${MINOR}.${PATCH}.${COMMITS_SINCE}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/telegram-bot-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/telegram-bot-mcp:latest
